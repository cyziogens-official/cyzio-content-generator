<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYZIO PRO V.11.8 | THE FINAL GATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff6b00; --bg: #050505; --panel: #0a0a0a; --border: #1f1f1f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 400px; background: var(--panel); border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .header h1 { font-size: 24px; font-weight: 800; color: var(--primary); }
        .paste-box { width: 100%; height: 150px; border: 2px dashed #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; cursor: text; transition: 0.3s; }
        .paste-box:focus { border-color: var(--primary); background: rgba(255,107,0,0.05); }
        .paste-box img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 10px; display: none; }
        .input-box { width: 100%; background: #000; border: 1px solid #222; border-radius: 10px; padding: 12px; color: #fff; outline: none; }
        .btn-gen { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .copy-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 25px; margin-bottom: 25px; border-left: 4px solid var(--primary); line-height: 1.7; }
        .grid-photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .photo-item { border-radius: 15px; overflow: hidden; border: 1px solid #222; }
        .photo-item img { width: 100%; height: 350px; object-fit: cover; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="header"><h1>CYZIO PRO</h1><p style="font-size: 10px; color: #555;">V.11.8 AUTO-ENGINE</p></div>
        <div>
            <p style="font-size: 11px; margin-bottom: 8px; color: var(--primary); font-weight: bold;">PASTE SEPATUNYA DISINI (CTRL+V)</p>
            <div class="paste-box" id="pasteBox" tabindex="0">
                <span id="labelTxt" style="font-size: 12px; color: #444;">Klik & Paste Gambar</span>
                <img id="prev">
            </div>
        </div>
        <textarea id="dInput" class="input-box" style="height: 100px;" placeholder="Tulis detail keunggulan sepatu..."></textarea>
        <button class="btn-gen" id="btn" onclick="generate()">🚀 JALANKAN IKLAN</button>
    </aside>
    <main class="main" id="out">
        <div id="statusUpdate" style="text-align: center; margin-top: 100px; color: #222;">MENUNGGU KARYA BAPAK...</div>
    </main>

    <script>
        // PAKAI API KEY EMAIL BARU BAPAK DI SINI
        const API_KEY = "AIzaSyCfcPF6nxjKaIG1JMhTtvJgvFQHIw8pf4o";

        let FOTO_DATA = "";
        let FOTO_MIME = "image/jpeg";

        document.getElementById('pasteBox').addEventListener('paste', function(e) {
            let item = e.clipboardData.items[0];
            if (item && item.type.indexOf("image") !== -1) {
                let blob = item.getAsFile();
                let reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('prev').src = event.target.result;
                    document.getElementById('prev').style.display = 'block';
                    document.getElementById('labelTxt').style.display = 'none';
                    FOTO_DATA = event.target.result.split(',')[1];
                    FOTO_MIME = blob.type;
                };
                reader.readAsDataURL(blob);
            }
        });

        async function generate() {
            if (!FOTO_DATA) return alert("Paste fotonya dulu ya Pak.");
            const b = document.getElementById('btn');
            const out = document.getElementById('out');
            b.disabled = true;

            const detail = document.getElementById('dInput').value || "Sepatu premium";
            const prompt = `Analyze product image. Create 1 Indonesian IG caption and 5 English prompts for photorealistic AI generation with human models. Format: [NASKAH]...[GAMBAR]1. prompt...`;

            // JURUS AUTO-ENGINE: MENCOBA DUA PINTU SEKALIGUS
            const engines = ["gemini-2.0-flash", "gemini-1.5-flash-latest"];
            let success = false;

            for (let model of engines) {
                out.innerHTML = `<div style='text-align:center; margin-top:100px; color:white;'>Mencoba akses lewat mesin: ${model.toUpperCase()}...</div>`;
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{text: prompt}, {inlineData: {mimeType: FOTO_MIME, data: FOTO_DATA}}] }] })
                    });
                    const d = await res.json();
                    if (res.ok) {
                        const txt = d.candidates[0].content.parts[0].text;
                        const ps = txt.split('[GAMBAR]');
                        const naskah = ps[0].replace('[NASKAH]', '').trim();
                        const pmpts = ps[1].match(/\d+\.\s*(.*)/g).map(p => p.replace(/\d+\.\s*/, '').trim());

                        let html = `<div class="copy-card"><strong>NASKAH IKLAN:</strong><br>${naskah.replace(/\n/g, '<br>')}</div><div class="grid-photos">`;
                        pmpts.forEach(p => {
                            html += `<div class="photo-item"><img src="https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?width=800&height=800&nologo=true"></div>`;
                        });
                        out.innerHTML = html + "</div>";
                        success = true;
                        break; 
                    }
                } catch (e) { console.log(e); }
            }

            if (!success) {
                out.innerHTML = `<div style='text-align:center; margin-top:100px; color:red;'>Gagal. Pastikan API Key benar dan coba 1 menit lagi.</div>`;
            }
            b.disabled = false; b.innerText = "🚀 JALANKAN IKLAN";
        }
    </script>
</body>
</html>
