<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYZIO PRO | COMMERCIAL CONTENT GENERATOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff6b00; --bg: #050505; --panel: #0a0a0a; --border: #1f1f1f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 400px; background: var(--panel); border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; gap: 20px; z-index:10; }
        .header h1 { font-size: 24px; font-weight: 800; color: var(--primary); }
        .header p { font-size: 10px; color: #555; margin-top: 5px; letter-spacing: 1px; }
        
        /* KOTAK UPLOAD FILE */
        .upload-box { width: 100%; height: 180px; border: 2px dashed #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; transition: 0.3s; background: #080808; cursor: pointer; }
        .upload-box:hover { border-color: var(--primary); background: rgba(255,107,0,0.05); }
        .upload-box img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 10px; display: none; z-index: 2; pointer-events: none; }
        
        .input-box { width: 100%; background: #000; border: 1px solid #222; border-radius: 10px; padding: 15px; color: #fff; outline: none; transition: 0.3s; resize: none; font-size: 13px; }
        .input-box:focus { border-color: var(--primary); }
        
        .btn-gen { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-gen:disabled { opacity: 0.5; cursor: wait; }
        
        .status-box { font-size: 11px; color: #888; text-align: center; margin-top: 10px; }
        .status-box span { color: var(--primary); font-weight: bold; }

        .main { flex: 1; padding: 40px; overflow-y: auto; scroll-behavior: smooth; }
        
        /* TAMPILAN PERSIS SCREENSHOT BAPAK */
        .copy-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 30px; margin-bottom: 30px; border-left: 4px solid var(--primary); line-height: 1.8; font-size: 14px; color: #ccc; }
        .copy-card strong { color: #fff; font-size: 14px; display: inline-block; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .grid-photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .photo-item { border-radius: 15px; overflow: hidden; border: 1px solid #222; position: relative; background: #0a0a0a; min-height: 350px; display: flex; align-items: center; justify-content: center; }
        .photo-item img { width: 100%; height: 350px; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 2; }
        .loading-text { color: var(--primary); font-size: 15px; font-weight: 800; z-index: 1; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="header">
            <h1>CYZIO PRO</h1>
            <p>V.19 COMMERCIAL (FILE UPLOAD)</p>
        </div>
        
        <div>
            <p style="font-size: 11px; margin-bottom: 8px; color: var(--primary); font-weight: bold;">01. UPLOAD FOTO PRODUK</p>
            <label class="upload-box" for="fileInput">
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                <span id="labelTxt" style="font-size: 12px; color: #666; font-weight: bold; text-align:center; line-height: 1.5;">Klik Di Sini Untuk<br>Upload Foto File</span>
                <img id="prev">
            </label>
        </div>
        
        <div>
            <p style="font-size: 11px; margin-bottom: 8px; color: var(--primary); font-weight: bold; margin-top: 10px;">02. DETAIL PRODUK (OPSIONAL)</p>
            <textarea id="dInput" class="input-box" style="height: 100px;" placeholder="Tulis deskripsi sepatu di sini (misal: sepatu hitam dengan les putih)..."></textarea>
        </div>
        
        <button class="btn-gen" id="btn" onclick="generate()">🚀 JALANKAN IKLAN</button>
        <div class="status-box" id="statusInfo">Menggunakan Kunci API: <span>01 / 28</span></div>
    </aside>
    
    <main class="main" id="out">
        <div style="text-align: center; margin-top: 150px; color: #333; font-weight: 800; font-size: 20px; letter-spacing: 2px;">MENUNGGU KARYA BAPAK...</div>
    </main>

    <script>
        // ==========================================
        // MASUKKAN 28 API KEY BAPAK DI SINI
        // ==========================================
        const apiKeys = [
            // 'AIzaSyAK_yHQFz_JCKE-wwYYQHIygmTYePUbwH4','AIzaSyB6Qa53GBXRRE2U8LVsWVXJ5RqUtDVUbCE','AIzaSyDiSIyfHMKIHf1tKhdEVQSfaU6SIihpChY','AIzaSyCsd72jfw7ulgmx_X-Ij_H5ZWc6nBzlgmk','AIzaSyDtRT_cEu5dp0nifcoAtPJ50Z3lDyXxLlY','AIzaSyAylMIUNaSuAauiPIKY2gUmcjJgh9fB350','AIzaSyAf5F4m2e8ITPJInPz3G6WpK-c5BK8zk08','AIzaSyA8KmL762stiDW5FbrYRUwrb-OGG2FJ6p4','AIzaSyCM3575RAXEtOTQXqOtCECWJAi6UR043fA','AIzaSyDMP4xbzx8D6JfOUqO33PGQhw6NoDM0Rm8','AIzaSyD-dc6b9NDklmD2uzlHm4Vgp82xk4afLdo
AIzaSyBy0rkdB7Q8UP810H0inT5MJqE9SAnEpZU','AIzaSyBFlo6ABw57bI1Q9fu7g5po0x0Db_XS_Bk','AIzaSyAydiilFPeJRdLvVGhRioTIKIRLYPAJcCY','AIzaSyA434055s8T4RWk_Es8eJv9NJ2VVAeo3qw','AIzaSyCaUqSEaQwz9ifVfpavsMtP0WBAN48p1Mc
AIzaSyDk2vzFGZgDVnxToB5qvuS8NyY-F2BK5g8','AIzaSyA54ihDYd2zCRU1aZA0fG3t_ATTUtx3BXM','AIzaSyDZWF67DHuMlcEfk7mkhfNLqhGgD3xI4zs','AIzaSyDeZKUJ2z9a4MVpyY_piReKAov9hZG1Jn8','AIzaSyDdhgbYr87HwKU_s08Z6b-Wngvpfqelc88
AIzaSyDDToIfvQdGGG3DvPij_vmVWqyXLYS7WoY','AIzaSyBjHDOM0iNfUA4Sn1drPLRxc_d8xC_TrnI','AIzaSyBcg_nvYs8Cvn6eSil4Td52zEEg_J3Oh7E','AIzaSyB0aqD83OQ2Cp36Hj-8ofa7oWqEq5Kgvow
        ];

        let currentKeyIndex = 0;
        let FOTO_DATA = "";
        let FOTO_MIME = "";

        // SISTEM UPLOAD FILE (TIDAK PAKAI PASTE LAGI)
        document.getElementById('fileInput').addEventListener('change', function(e) {
            let file = e.target.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('prev').src = event.target.result;
                    document.getElementById('prev').style.display = 'block';
                    document.getElementById('labelTxt').style.display = 'none';
                    // Ambil raw base64 data untuk dikirim ke Gemini
                    FOTO_DATA = event.target.result.split(',')[1];
                    FOTO_MIME = file.type;
                };
                reader.readAsDataURL(file);
            }
        });

        async function generate() {
            if (!FOTO_DATA) return alert("Pak, silakan klik kotak atas untuk meng-upload foto terlebih dahulu.");
            if (apiKeys.length === 0) return alert("Pak, API Key-nya belum dimasukkan ke dalam kode!");
            
            const btn = document.getElementById('btn');
            const out = document.getElementById('out');
            const statusInfo = document.getElementById('statusInfo');
            
            btn.disabled = true;
            btn.innerText = "MENGANALISIS FOTO...";
            out.innerHTML = "<div style='text-align:center; margin-top:150px; color:var(--primary); font-weight:800; animation: pulse 1s infinite;'>MENGHUBUNGI MESIN GEMINI...</div>";

            const detail = document.getElementById('dInput').value || "produk di gambar ini";
            const prompt = `Analyze this exact product image very closely. The content MUST be highly tailored to the specific design, color, and vibe of the uploaded image. Additional context: ${detail}.
            Format your response EXACTLY like this:
            [NASKAH]
            (Write a catchy Instagram Caption here in Indonesian)
            [UGC]
            (Write 3 concepts for UGC B-Roll video here in Indonesian)
            [KOMERSIAL]
            (Write 3 concepts for Commercial ad video here in Indonesian)
            [GAMBAR]
            1. (English prompt for photorealistic AI generation showing a model wearing this exact product)
            2. (English prompt for AI image...)
            3. (English prompt for AI image...)`;

            let success = false;
            let finalData = null;
            let errorMessage = "";

            // ROTASI KUNCI OTOMATIS
            for (let i = 0; i < apiKeys.length; i++) {
                const currentKey = apiKeys[currentKeyIndex];
                statusInfo.innerHTML = `Menggunakan Kunci API: <span>${(currentKeyIndex + 1).toString().padStart(2, '0')} / ${apiKeys.length}</span>`;
                
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${currentKey}`, {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{text: prompt}, {inlineData: {mimeType: FOTO_MIME, data: FOTO_DATA}}] }] 
                        })
                    });

                    const d = await res.json();
                    
                    if (res.ok) {
                        finalData = d;
                        success = true;
                        break; 
                    } else {
                        errorMessage = d.error?.message || "Limit tercapai";
                        currentKeyIndex = (currentKeyIndex + 1) % apiKeys.length;
                    }
                } catch (e) {
                    errorMessage = e.message;
                    currentKeyIndex = (currentKeyIndex + 1) % apiKeys.length;
                }
            }

            if (!success) {
                out.innerHTML = `<div style='text-align:center; margin-top:150px; color:red; font-weight:bold;'>Seluruh Kunci Gagal Menembus Google.<br><br>Pesan Error: ${errorMessage}</div>`;
                btn.disabled = false; btn.innerText = "🚀 JALANKAN IKLAN";
                return;
            }

            // MERAKIT TAMPILAN SESUAI SCREENSHOT
            try {
                const txt = finalData.candidates[0].content.parts[0].text;
                
                let naskah = txt.includes('[NASKAH]') && txt.includes('[UGC]') ? txt.substring(txt.indexOf('[NASKAH]') + 8, txt.indexOf('[UGC]')).trim() : "Naskah iklan siap.";
                let ugc = txt.includes('[UGC]') && txt.includes('[KOMERSIAL]') ? txt.substring(txt.indexOf('[UGC]') + 5, txt.indexOf('[KOMERSIAL]')).trim() : "Ide UGC siap.";
                let komersial = txt.includes('[KOMERSIAL]') && txt.includes('[GAMBAR]') ? txt.substring(txt.indexOf('[KOMERSIAL]') + 11, txt.indexOf('[GAMBAR]')).trim() : "Ide komersial siap.";
                
                let pmpts = ["model wearing the product, high quality", "lifestyle product photography", "cinematic product shot"];
                if (txt.includes('[GAMBAR]')) {
                    const gambarTxt = txt.substring(txt.indexOf('[GAMBAR]') + 8);
                    const matches = gambarTxt.match(/\d+\.\s*(.*)/g);
                    if (matches) pmpts = matches.map(p => p.replace(/\d+\.\s*/, '').trim());
                }

                // FORMAT KARTU NASKAH PERSIS SCREENSHOT (1 KOTAK BESAR)
                let html = `
                <div class="copy-card">
                    <strong style="margin-bottom:15px;">NASKAH IKLAN:</strong><br>
                    <div style="margin-bottom: 30px;">${naskah.replace(/\n/g, '<br>')}</div>
                    
                    <strong style="margin-bottom:15px;">🎥 B-ROLL UGC:</strong><br>
                    <div style="margin-bottom: 30px;">${ugc.replace(/\n/g, '<br>')}</div>
                    
                    <strong style="margin-bottom:15px;">🎬 SKENARIO KOMERSIAL:</strong><br>
                    <div>${komersial.replace(/\n/g, '<br>')}</div>
                </div>
                <div class="grid-photos">`;
                
                pmpts.forEach((p, i) => {
                    const seed = Math.floor(Math.random() * 99999);
                    const cleanP = encodeURIComponent(p + ", high quality, photorealistic, 8k resolution");
                    const aiUrl = `https://image.pollinations.ai/prompt/${cleanP}?width=800&height=800&nologo=true&seed=${seed}`;
                    
                    // KOTAK GAMBAR PERSIS SCREENSHOT (Hanya gambar dan tulisan 'Koneksi Terputus' jika gagal)
                    html += `
                    <div class="photo-item">
                        <span class="loading-text" style="color:#ff6b00; text-transform:none;">Koneksi Terputus</span>
                        <img src="${aiUrl}" onload="this.style.opacity=1" onerror="this.onerror=null; this.src='https://loremflickr.com/800/800/shoes?lock=${seed}';">
                    </div>`;
                });
                out.innerHTML = html + "</div>";
            } catch (e) {
                out.innerHTML = `<div style='text-align:center; color:red;'>Gagal merakit teks: ${e.message}</div>`;
            }
            
            btn.disabled = false; btn.innerText = "🚀 JALANKAN IKLAN";
        }
    </script>
</body>
</html>
