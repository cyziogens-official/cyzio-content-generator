<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYZIO PRO V.10.5 | GEMINI 2.5 UPDATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff6b00; --bg-main: #050505; --bg-panel: #0a0a0a; --border: #1f1f1f; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: #fff; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 420px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .header { padding: 30px; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .header h1 span { color: var(--primary); }
        .dev-badge { display: inline-block; margin-top: 8px; font-size: 9px; padding: 4px 8px; background: #111; border: 1px solid #222; border-radius: 4px; color: var(--text-dim); }
        .form-area { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .sec-title { font-size: 10px; font-weight: 800; color: var(--primary); letter-spacing: 1.5px; margin-bottom: 10px; }
        .input-box { width: 100%; background: #000; border: 1px solid #222; border-radius: 10px; padding: 12px 15px; color: #fff; font-size: 13px; outline: none; transition: 0.3s; margin-bottom: 10px; }
        .input-box:focus { border-color: var(--primary); }
        textarea.input-box { resize: none; height: 70px; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }
        .col label { display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 6px; }
        .btn-gen { background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 10px; font-weight: 800; font-size: 13px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-gen:hover { background: #e65c00; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,107,0,0.2); }
        .btn-gen:disabled { opacity: 0.5; cursor: wait; transform: none; box-shadow: none; }
        .main { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        .copy-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 30px; margin-bottom: 30px; line-height: 1.8; color: #e2e8f0; font-size: 14px; border-left: 3px solid var(--primary); }
        .grid-photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .photo-item { background: #000; border-radius: 15px; overflow: hidden; border: 1px solid #222; position: relative; }
        .photo-item img { width: 100%; height: 400px; object-fit: cover; }
        .photo-item .meta { position: absolute; bottom: 0; width: 100%; padding: 15px; background: linear-gradient(0deg, #000, transparent); font-size: 10px; font-weight: 800; color: #fff; text-align: center; }
        .paste-box { width: 100%; height: 130px; border: 2px dashed #ff6b00; border-radius: 12px; background: rgba(255,107,0,0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: text; position: relative; overflow: hidden; outline: none; transition: 0.3s; }
        .paste-box:focus { background: rgba(255,107,0,0.15); border: 2px solid #ff6b00; box-shadow: 0 0 15px rgba(255,107,0,0.3); }
        .paste-box img { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; display: none; }
        .paste-box .text { z-index: 10; font-size: 12px; font-weight: 700; color: #ff6b00; text-align: center; padding: 10px; line-height: 1.6; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="header"><h1>CYZIO <span>PRO</span></h1><div class="dev-badge">V.10.5 GEMINI 2.5 ENGINE</div></div>
        <div class="form-area">
            <div>
                <div class="sec-title">01. FOTO PRODUK (JALUR PASTE)</div>
                <div class="paste-box" id="pasteProd" tabindex="0">
                    <div class="text" id="txtProd">KLIK KOTAK INI<br>LALU TEKAN <strong>(CTRL + V)</strong></div>
                    <img id="imgProd">
                </div>
            </div>

            <div style="margin-top:20px;">
                <div class="sec-title">02. STRATEGI IKLAN</div>
                <textarea id="dInput" class="input-box" placeholder="Detail produk..."></textarea>
                <div class="row">
                    <div class="col"><label>Gender</label><select id="sGen" class="input-box"><option>Wanita</option><option>Pria</option></select></div>
                    <div class="col"><label>Usia</label><select id="sAge" class="input-box"><option>20-an Tahun</option><option>30-an Tahun</option></select></div>
                </div>
                <div class="row">
                    <div class="col"><label>Format</label><select id="sFormat" class="input-box"><option>9:16 (Vertical)</option><option>1:1 (Square)</option></select></div>
                    <div class="col"><label>Campaign</label><select id="sCamp" class="input-box"><option>Soft Selling</option><option>Hard Promo</option></select></div>
                </div>
            </div>

            <button class="btn-gen" id="btnGen" onclick="generate()">🚀 GENERATE CONTENT</button>
        </div>
    </aside>
    <main class="main">
        <div class="top-bar"><div class="ws-title">Workspace</div><div class="status" id="sysStatus" style="color:#10b981;">Ready</div></div>
        <div id="out"><div style="text-align:center; margin-top:100px; color:#333; font-weight:600;">SILAKAN COPY FOTO DI KOMPUTER, LALU PASTE DI KOTAK KIRI</div></div>
    </main>

    <script>
        const KEYS = "AIzaSyA2Ox-W1IykjypH2J8lC6pDL--SaX1ogYA,AIzaSyAR9bP_4FSzAYfOWr4r-CrNXLeMAW3id80,AIzaSyDpwSlrdXqXYeUl-4xzZvr6VR74IG13dJI,AIzaSyAK_yHQFz_JCKE-wwYYQHIygmTYePUbwH4,AIzaSyB6Qa53GBXRRE2U8LVsWVXJ5RqUtDVUbCE,AIzaSyDiSIyfHMKIHf1tKhdEVQSfaU6SIihpChY,AIzaSyCsd72jfw7ulgmx_X-Ij_H5ZWc6nBzlgmk,AIzaSyDtRT_cEu5dp0nifcoAtPJ50Z3lDyXxLlY,AIzaSyAylMIUNaSuAauiPIKY2gUmcjJgh9fB350,AIzaSyAf5F4m2e8ITPJInPz3G6WpK-c5BK8zk08,AIzaSyA8KmL762stiDW5FbrYRUwrb-OGG2FJ6p4,AIzaSyCM3575RAXEtOTQXqOtCECWJAi6UR043fA,AIzaSyDMP4xbzx8D6JfOUqO33PGQhw6NoDM0Rm8,AIzaSyD-dc6b9NDklmD2uzlHm4Vgp82xk4afLdo,AIzaSyBy0rkdB7Q8UP810H0inT5MJqE9SAnEpZU,AIzaSyBFlo6ABw57bI1Q9fu7g5po0x0Db_XS_Bk,AIzaSyAydiilFPeJRdLvVGhRioTIKIRLYPAJcCY,AIzaSyA434055s8T4RWk_Es8eJv9NJ2VVAeo3qw,AIzaSyCaUqSEaQwz9ifVfpavsMtP0WBAN48p1Mc,AIzaSyDk2vzFGZgDVnxToB5qvuS8NyY-F2BK5g8,AIzaSyA54ihDYd2zCRU1aZA0fG3t_ATTUtx3BXM,AIzaSyDZWF67DHuMlcEfk7mkhfNLqhGgD3xI4zs,AIzaSyDeZKUJ2z9a4MVpyY_piReKAov9hZG1Jn8,AIzaSyDdhgbYr87HwKU_s08Z6b-Wngvpfqelc88,AIzaSyDDToIfvQdGGG3DvPij_vmVWqyXLYS7WoY,AIzaSyBjHDOM0iNfUA4Sn1drPLRxc_d8xC_TrnI,AIzaSyBcg_nvYs8Cvn6eSil4Td52zEEg_J3Oh7E,AIzaSyB0aqD83OQ2Cp36Hj-8ofa7oWqEq5Kgvow".split(',');
        
        let FOTO_PRODUK_MEMORY = ""; 
        let MIME_TYPE = "image/jpeg";

        document.getElementById('pasteProd').addEventListener('paste', function(e) {
            e.preventDefault();
            var items = e.clipboardData.items;
            for (var i = 0; i < items.length; i++) {
                if (items[i].type.indexOf("image") !== -1) {
                    var blob = items[i].getAsFile();
                    var reader = new FileReader();
                    reader.onload = function(event) {
                        document.getElementById('imgProd').src = event.target.result;
                        document.getElementById('imgProd').style.display = 'block';
                        document.getElementById('txtProd').style.display = 'none';
                        var mentah = event.target.result;
                        if(mentah.includes(',')) mentah = mentah.split(',')[1];
                        FOTO_PRODUK_MEMORY = mentah.replace(/[^A-Za-z0-9+/=]/g, ""); 
                        MIME_TYPE = blob.type || "image/jpeg";
                    };
                    reader.readAsDataURL(blob);
                    break;
                }
            }
        });

        async function generate() {
            if(!FOTO_PRODUK_MEMORY) return alert("Bapak wajib Paste Foto Produk dulu!");

            var btn = document.getElementById('btnGen');
            var stts = document.getElementById('sysStatus');
            btn.disabled = true; 

            var d = document.getElementById('dInput').value || "Produk berkualitas premium";
            var g = document.getElementById('sGen').value;
            var a = document.getElementById('sAge').value;
            var f = document.getElementById('sFormat').value;
            var c = document.getElementById('sCamp').value;

            var pr = `Analyze this product image. Product Detail: ${d}. Target Audience: ${g}, ${a}. Campaign Style: ${c}. Output Format: ${f}. Generate realistic AI human models.
            Output exactly in this format:
            [NASKAH]
            (Write 1 highly engaging Instagram caption in Indonesian with emojis and hashtags)
            [GAMBAR]
            1. (English prompt for AI image generator, photorealistic)
            2. (English prompt for AI image generator, photorealistic)
            3. (English prompt for AI image generator, photorealistic)
            4. (English prompt for AI image generator, photorealistic)
            5. (English prompt for AI image generator, photorealistic)`;

            document.getElementById('out').innerHTML = "<div style='text-align:center; margin-top:100px; color:#ff6b00; font-weight:800;'>MENGHUBUNGI MESIN GOOGLE TERBARU...</div>";

            var suksesTembus = false;
            var dataHasil = null;
            var errorTerakhir = "";
            
            // UPDATE 2026: Mesin khusus untuk API Key Fresh
            var daftarMesinBaru = ['gemini-2.5-flash', 'gemini-2.0-flash'];

            for (var i = 0; i < KEYS.length; i++) {
                var currentKey = KEYS[i].trim();
                
                for(var m = 0; m < daftarMesinBaru.length; m++) {
                    var mesinPilihan = daftarMesinBaru[m];
                    btn.innerText = `KUNCI ${i+1} ➔ MESIN ${mesinPilihan.toUpperCase()}`;
                    stts.innerHTML = `Mengetes koneksi...`;
                    
                    try {
                        var res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${mesinPilihan}:generateContent?key=${currentKey}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{text: pr}, {inlineData: {mimeType: MIME_TYPE, data: FOTO_PRODUK_MEMORY}}] }] })
                        });

                        var dtTemp = await res.json();
                        
                        if (res.ok) {
                            dataHasil = dtTemp;
                            suksesTembus = true;
                            break; // HENTIKAN PENCARIAN MESIN
                        } else {
                            errorTerakhir = dtTemp.error?.message || "Ditolak";
                        }
                    } catch (e) {
                        errorTerakhir = e.message;
                    }
                }
                if (suksesTembus) break; // HENTIKAN PENCARIAN KUNCI
            }

            if (!suksesTembus) {
                stts.innerHTML = "Gagal Menembus Google!";
                alert("Ya ampun, Google masih menolak! Error: " + errorTerakhir);
                btn.disabled = false; btn.innerText = "🚀 GENERATE CONTENT";
                document.getElementById('out').innerHTML = "";
                return;
            }

            // JIKA TEMBUS, LANGSUNG TAMPILKAN!
            try {
                stts.innerHTML = "Berhasil! Merakit Hasil...";
                var txt = dataHasil.candidates[0].content.parts[0].text;
                var ps = txt.split('[GAMBAR]');
                var naskah = ps[0].replace('[NASKAH]', '').trim();
                var pmpts = ps[1].match(/\d+\.\s*(.*)/g).map(p => p.replace(/\d+\.\s*/, '').trim());

                var w = 540, h = 960; if(f.includes("1:1")) { w = 800; h = 800; }

                var html = `<div class="copy-card"><strong>NASKAH IKLAN:</strong><br><br>${naskah.replace(/\n/g, '<br>')}</div><div class="grid-photos">`;
                pmpts.forEach((p, i) => {
                    var cleanP = encodeURIComponent(p.substring(0,120) + ", high quality, 8k resolution");
                    html += `<div class="photo-item"><img src="https://image.pollinations.ai/prompt/${cleanP}?width=${w}&height=${h}&nologo=true&seed=${Math.floor(Math.random()*999)}"><div class="meta">VISUAL CONCEPT ${i+1}</div></div>`;
                });
                document.getElementById('out').innerHTML = html + "</div>";
                stts.innerText = "Generasi Sukses!";
            } catch (e) {
                alert("Gagal memecah hasil: " + e.message);
            }
            btn.disabled = false; btn.innerText = "🚀 GENERATE CONTENT";
        }
    </script>
</body>
</html>
