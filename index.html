<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYZIO PRO V.9.6 | Enterprise AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff6b00; --bg-main: #050505; --bg-panel: #0a0a0a; --border: #1f1f1f; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: #fff; height: 100vh; display: flex; overflow: hidden; background-image: radial-gradient(circle at 100% 0%, rgba(255,107,0,0.05), transparent 50%); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .sidebar { width: 420px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .header { padding: 30px; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .header h1 span { color: var(--primary); }
        .dev-badge { display: inline-block; margin-top: 8px; font-size: 9px; padding: 4px 8px; background: #111; border: 1px solid #222; border-radius: 4px; color: var(--text-dim); letter-spacing: 1px; }
        .form-area { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .sec-title { font-size: 10px; font-weight: 800; color: var(--primary); letter-spacing: 1.5px; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .upload-card { width: 100%; height: 110px; border: 1px dashed #333; border-radius: 12px; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; transition: 0.3s; }
        .upload-card:hover { border-color: var(--primary); background: rgba(255,107,0,0.05); }
        .preview-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; display: none; }
        .input-box { width: 100%; background: #000; border: 1px solid #222; border-radius: 10px; padding: 12px 15px; color: #fff; font-size: 13px; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: var(--primary); }
        textarea.input-box { resize: none; height: 70px; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }
        .col label { display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        .btn-gen { background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 10px; font-weight: 800; font-size: 13px; cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-gen:hover { background: #e65c00; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,107,0,0.2); }
        .btn-gen:disabled { opacity: 0.5; cursor: wait; transform: none; box-shadow: none; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .ws-title { font-size: 12px; color: var(--text-dim); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
        .status { font-size: 11px; font-weight: 700; color: #10b981; }
        .status.loading { color: var(--primary); }
        .copy-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 30px; margin-bottom: 30px; line-height: 1.8; color: #e2e8f0; font-size: 14px; border-left: 3px solid var(--primary); }
        .grid-photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .photo-item { background: #000; border-radius: 15px; overflow: hidden; border: 1px solid #222; position: relative; }
        .photo-item img { width: 100%; height: 400px; object-fit: cover; }
        .photo-item .meta { position: absolute; bottom: 0; width: 100%; padding: 15px; background: linear-gradient(0deg, #000, transparent); font-size: 10px; font-weight: 800; color: #fff; text-align: center; letter-spacing: 1px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="header">
            <h1>CYZIO <span>PRO</span></h1>
            <div class="dev-badge">V.9.6 ENTERPRISE SUITE</div>
        </div>
        
        <div class="form-area">
            <div>
                <div class="sec-title">01. PRODUCT DATA</div>
                <div class="upload-card" onclick="document.getElementById('fProd').click()">
                    <input type="file" id="fProd" accept="image/*" style="display:none;">
                    <div id="txtProd" style="text-align:center; color:var(--text-dim); font-size:11px; font-weight:600;">📷 Klik Upload Foto Produk</div>
                    <img id="imgProd" class="preview-img">
                </div>
                <input type="hidden" id="dataProd" data-mime="image/jpeg">
                <textarea id="dInput" class="input-box" style="margin-top:10px;" placeholder="Detail/Keunggulan produk..."></textarea>
            </div>

            <div>
                <div class="sec-title">02. TALENT & MODEL</div>
                <div class="row" style="margin-bottom:10px;">
                    <div class="col">
                        <label>Sumber Model</label>
                        <select id="sSource" class="input-box" onchange="toggleModel()">
                            <option value="AI">AI Generated Talent</option>
                            <option value="CUSTOM">Upload Model Sendiri</option>
                        </select>
                    </div>
                </div>
                
                <div class="upload-card" id="cardModel" style="display:none; margin-bottom:10px; border-color:var(--primary);" onclick="document.getElementById('fModel').click()">
                    <input type="file" id="fModel" accept="image/*" style="display:none;">
                    <div id="txtModel" style="text-align:center; color:var(--primary); font-size:11px; font-weight:600;">🙎‍♀️ Klik Upload Foto Model</div>
                    <img id="imgModel" class="preview-img">
                </div>
                <input type="hidden" id="dataModel" data-mime="image/jpeg">

                <div class="row">
                    <div class="col"><label>Gender</label><select id="sGen" class="input-box"><option>Wanita</option><option>Pria</option><option>Couple</option></select></div>
                    <div class="col"><label>Usia</label><select id="sAge" class="input-box"><option>20-an Tahun</option><option>30-an Tahun</option><option>Remaja</option></select></div>
                </div>
            </div>

            <div>
                <div class="sec-title">03. OUTPUT ENGINE</div>
                <div class="row">
                    <div class="col"><label>Format</label><select id="sFormat" class="input-box"><option>9:16 (Vertical)</option><option>1:1 (Square)</option></select></div>
                    <div class="col"><label>Campaign</label><select id="sCamp" class="input-box"><option>Soft Selling</option><option>Hard Promo</option></select></div>
                </div>
            </div>

            <button class="btn-gen" id="btnGen" onclick="generate()">🚀 Generate Content</button>
        </div>
    </aside>

    <main class="main">
        <div class="top-bar">
            <div class="ws-title">Active Workspace</div>
            <div class="status" id="sysStatus">Ready</div>
        </div>
        <div id="out">
            <div style="text-align:center; margin-top:100px; color:#333; font-size:14px; font-weight:600;">
                SILAKAN UPLOAD GAMBAR DAN SETTING STRATEGI
            </div>
        </div>
    </main>

    <script>
        const KEYS = "AIzaSyA2Ox-W1IykjypH2J8lC6pDL--SaX1ogYA,AIzaSyAR9bP_4FSzAYfOWr4r-CrNXLeMAW3id80,AIzaSyDpwSlrdXqXYeUl-4xzZvr6VR74IG13dJI,AIzaSyAK_yHQFz_JCKE-wwYYQHIygmTYePUbwH4,AIzaSyB6Qa53GBXRRE2U8LVsWVXJ5RqUtDVUbCE,AIzaSyDiSIyfHMKIHf1tKhdEVQSfaU6SIihpChY,AIzaSyCsd72jfw7ulgmx_X-Ij_H5ZWc6nBzlgmk,AIzaSyDtRT_cEu5dp0nifcoAtPJ50Z3lDyXxLlY,AIzaSyAylMIUNaSuAauiPIKY2gUmcjJgh9fB350,AIzaSyAf5F4m2e8ITPJInPz3G6WpK-c5BK8zk08,AIzaSyA8KmL762stiDW5FbrYRUwrb-OGG2FJ6p4,AIzaSyCM3575RAXEtOTQXqOtCECWJAi6UR043fA,AIzaSyDMP4xbzx8D6JfOUqO33PGQhw6NoDM0Rm8,AIzaSyD-dc6b9NDklmD2uzlHm4Vgp82xk4afLdo,AIzaSyBy0rkdB7Q8UP810H0inT5MJqE9SAnEpZU,AIzaSyBFlo6ABw57bI1Q9fu7g5po0x0Db_XS_Bk,AIzaSyAydiilFPeJRdLvVGhRioTIKIRLYPAJcCY,AIzaSyA434055s8T4RWk_Es8eJv9NJ2VVAeo3qw,AIzaSyCaUqSEaQwz9ifVfpavsMtP0WBAN48p1Mc,AIzaSyDk2vzFGZgDVnxToB5qvuS8NyY-F2BK5g8,AIzaSyA54ihDYd2zCRU1aZA0fG3t_ATTUtx3BXM,AIzaSyDZWF67DHuMlcEfk7mkhfNLqhGgD3xI4zs,AIzaSyDeZKUJ2z9a4MVpyY_piReKAov9hZG1Jn8,AIzaSyDdhgbYr87HwKU_s08Z6b-Wngvpfqelc88,AIzaSyDDToIfvQdGGG3DvPij_vmVWqyXLYS7WoY,AIzaSyBjHDOM0iNfUA4Sn1drPLRxc_d8xC_TrnI,AIzaSyBcg_nvYs8Cvn6eSil4Td52zEEg_J3Oh7E,AIzaSyB0aqD83OQ2Cp36Hj-8ofa7oWqEq5Kgvow".split(',');

        // SISTEM BACA FOTO PALING TAHAN BANTING
        document.getElementById('fProd').addEventListener('change', function(e) {
            bacaFoto(e, 'imgProd', 'txtProd', 'dataProd');
        });

        document.getElementById('fModel').addEventListener('change', function(e) {
            bacaFoto(e, 'imgModel', 'txtModel', 'dataModel');
        });

        function bacaFoto(event, imgId, txtId, dataId) {
            var file = event.target.files;
            if (!file) return;

            var reader = new FileReader();
            reader.onload = function(e) {
                // Munculkan Foto
                document.getElementById(imgId).src = e.target.result;
                document.getElementById(imgId).style.display = 'block';
                document.getElementById(txtId).style.display = 'none';
                
                // Simpan Data
                document.getElementById(dataId).value = e.target.result.split(',');
                document.getElementById(dataId).setAttribute('data-mime', file.type || 'image/jpeg');
            };
            reader.readAsDataURL(file);
        }

        function toggleModel() {
            var val = document.getElementById('sSource').value;
            document.getElementById('cardModel').style.display = (val === 'CUSTOM') ? 'flex' : 'none';
        }

        async function generate() {
            var prodData = document.getElementById('dataProd').value;
            var modelData = document.getElementById('dataModel').value;
            var source = document.getElementById('sSource').value;
            
            if(!prodData) return alert("Bapak wajib upload Foto Produk dulu!");
            if(source === 'CUSTOM' && !modelData) return alert("Bapak wajib upload Foto Model juga!");

            var btn = document.getElementById('btnGen');
            var stts = document.getElementById('sysStatus');
            btn.disabled = true; btn.innerText = "Menganalisis Data...";
            stts.className = "status loading"; stts.innerText = "Menembus Server Google...";
            document.getElementById('out').innerHTML = "<div style='text-align:center; margin-top:100px; color:#ff6b00; font-weight:800;'>MENGANALISIS DATA VISUAL...</div>";

            var detail = document.getElementById('dInput').value || "Produk terbaik";
            var gen = document.getElementById('sGen').value;
            var age = document.getElementById('sAge').value;
            var format = document.getElementById('sFormat').value;
            var camp = document.getElementById('sCamp').value;

            var prodMime = document.getElementById('dataProd').getAttribute('data-mime') || "image/jpeg";
            var modelMime = document.getElementById('dataModel').getAttribute('data-mime') || "image/jpeg";

            var partsArray = [
                { text: `Act as an Instagram Marketer. Analyze the product image provided. 
                Product Detail: ${detail}. Target Audience: ${gen}, ${age}. Campaign: ${camp}. Output Format: ${format}.
                ${source === 'CUSTOM' ? "I have also provided a second image of a human model. The final AI prompts MUST describe this specific human model wearing/using the product." : "Generate realistic AI human models in the prompts."}
                
                Format Exactly Like This:
                [NASKAH]
                (Write 1 engaging Instagram caption in Indonesian)
                [GAMBAR]
                1. (English prompt for AI image generator)
                2. (Prompt 2)
                3. (Prompt 3)
                4. (Prompt 4)
                5. (Prompt 5)` }
            ];

            partsArray.push({ inlineData: { mimeType: prodMime, data: prodData } });
            if (source === 'CUSTOM') partsArray.push({ inlineData: { mimeType: modelMime, data: modelData } });

            var key = KEYS[Math.floor(Math.random() * KEYS.length)];
            
            try {
                var response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: partsArray }] })
                });

                var d = await response.json();
                if (!response.ok) throw new Error(d.error?.message || "Google Sibuk");

                var txt = d.candidates.content.parts.text;
                var ps = txt.split('[GAMBAR]');
                var naskah = ps.replace('[NASKAH]', '').trim();
                var pmpts = ps.match(/\d+\.\s*(.*)/g).map(p => p.replace(/\d+\.\s*/, '').trim());

                var w = 540, h = 960; if(format.includes("1:1")) { w = 800; h = 800; }

                var html = `<div class="copy-card"><strong>NASKAH IKLAN:</strong><br><br>${naskah.replace(/\n/g, '<br>')}</div><div class="grid-photos">`;
                pmpts.forEach((p, i) => {
                    var cleanP = encodeURIComponent(p.substring(0,120) + ", high quality, 8k resolution");
                    html += `<div class="photo-item"><img src="https://image.pollinations.ai/prompt/${cleanP}?width=${w}&height=${h}&nologo=true&seed=${Math.floor(Math.random()*999)}"><div class="meta">CONCEPT ${i+1}</div></div>`;
                });

                document.getElementById('out').innerHTML = html + "</div>";
                stts.className = "status"; stts.innerText = "Selesai!";
            } catch (e) {
                stts.className = "status loading"; stts.innerText = "Error!";
                alert("Klik sekali lagi Pak: " + e.message);
            }
            btn.disabled = false; btn.innerText = "🚀 GENERATE CONTENT";
        }
    </script>
</body>
</html>
