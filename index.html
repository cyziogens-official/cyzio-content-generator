<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYZIO PRO V.12 | GOOGLE KILLER</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff6b00; --bg: #050505; --panel: #0a0a0a; --border: #1f1f1f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 400px; background: var(--panel); border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; gap: 20px; z-index:10; }
        .header h1 { font-size: 24px; font-weight: 800; color: var(--primary); }
        .paste-box { width: 100%; height: 150px; border: 2px dashed #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; cursor: text; transition: 0.3s; }
        .paste-box:focus { border-color: var(--primary); background: rgba(255,107,0,0.05); }
        .paste-box img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 10px; display: none; }
        .input-box { width: 100%; background: #000; border: 1px solid #222; border-radius: 10px; padding: 12px; color: #fff; outline: none; }
        .btn-gen { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-gen:disabled { opacity: 0.5; cursor: wait; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .copy-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 25px; margin-bottom: 25px; border-left: 4px solid var(--primary); line-height: 1.7; }
        .grid-photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .photo-item { border-radius: 15px; overflow: hidden; border: 1px solid #222; }
        .photo-item img { width: 100%; height: 350px; object-fit: cover; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="header"><h1>CYZIO PRO</h1><p style="font-size: 10px; color: #555;">V.12 THE GOOGLE KILLER (NO API KEY)</p></div>
        <div>
            <p style="font-size: 11px; margin-bottom: 8px; color: var(--primary); font-weight: bold;">01. PASTE FOTO (CTRL+V)</p>
            <div class="paste-box" id="pasteBox" tabindex="0">
                <span id="labelTxt" style="font-size: 12px; color: #444;">Klik & Paste Gambar</span>
                <img id="prev">
            </div>
        </div>
        <textarea id="dInput" class="input-box" style="height: 100px;" placeholder="WAJIB DIISI: Tulis detail produk (Contoh: Sepatu kulit hitam sol coklat merk Superga)..."></textarea>
        <button class="btn-gen" id="btn" onclick="generate()">🚀 JALANKAN TANPA GOOGLE</button>
    </aside>
    <main class="main" id="out">
        <div id="statusUpdate" style="text-align: center; margin-top: 100px; color: #222;">MENUNGGU KARYA BAPAK...</div>
    </main>

    <script>
        // BYE-BYE GOOGLE! TIDAK PERLU API KEY SAMA SEKALI! 
        let FOTO_DATA = "";

        document.getElementById('pasteBox').addEventListener('paste', function(e) {
            let item = e.clipboardData.items[0];
            if (item && item.type.indexOf("image") !== -1) {
                let blob = item.getAsFile();
                let reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('prev').src = event.target.result;
                    document.getElementById('prev').style.display = 'block';
                    document.getElementById('labelTxt').style.display = 'none';
                    FOTO_DATA = "ADA"; 
                };
                reader.readAsDataURL(blob);
            }
        });

        async function generate() {
            const detail = document.getElementById('dInput').value;
            if (!FOTO_DATA) return alert("Paste fotonya dulu ya Pak.");
            if (!detail || detail.length < 5) return alert("Pak, karena kita tidak pakai Google, Bapak WAJIB menuliskan deskripsi sepatunya (contoh: Sepatu hitam sol coklat) di kolom isian agar AI paham apa yang diiklankan.");

            const b = document.getElementById('btn');
            const out = document.getElementById('out');
            b.disabled = true; b.innerText = "MENEMBUS SERVER BEBAS LIMIT...";
            out.innerHTML = "<div style='text-align:center; margin-top:100px; color:white;'>Merakit naskah dan gambar tanpa batasan dari Google...</div>";

            const prompt = `Act as an expert marketer. I am selling: "${detail}".
Task 1: Write an engaging Indonesian Instagram caption.
Task 2: Write 5 English prompts for an AI image generator to showcase this product.
You MUST use this EXACT format:
[NASKAH]
<caption here>
[GAMBAR]
1. <prompt 1>
2. <prompt 2>
3. <prompt 3>
4. <prompt 4>
5. <prompt 5>`;

            try {
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}`);
                const txt = await res.text();

                let naskah = "Naskah iklan siap disajikan.";
                let pmpts = [detail + " product shot", detail + " lifestyle", detail + " premium studio", detail + " outdoor", detail + " cinematic"];

                if(txt.includes('[GAMBAR]')) {
                    const ps = txt.split('[GAMBAR]');
                    naskah = ps[0].replace(/\[NASKAH\]/gi, '').trim();
                    const matches = ps[1].match(/\d+\.\s*(.*)/g);
                    if(matches) {
                        pmpts = matches.map(p => p.replace(/\d+\.\s*/, '').trim());
                    } else {
                        const lines = ps[1].split('\n').filter(l => l.trim().length > 5);
                        if(lines.length >= 5) {
                            pmpts = lines.slice(0, 5).map(l => l.replace(/^\d+\.\s*/, '').trim());
                        }
                    }
                } else {
                    naskah = txt; // Jika format AI sedikit meleset, naskah tetap aman
                }

                let html = `<div class="copy-card"><strong>NASKAH IKLAN:</strong><br><br>${naskah.replace(/\n/g, '<br>')}</div><div class="grid-photos">`;
                pmpts.forEach((p, i) => {
                    const seed = Math.floor(Math.random() * 99999);
                    const cleanP = encodeURIComponent(p + ", high quality, photorealistic, 8k");
                    html += `<div class="photo-item"><img src="https://image.pollinations.ai/prompt/${cleanP}?width=800&height=800&nologo=true&seed=${seed}"></div>`;
                });
                out.innerHTML = html + "</div>";
            } catch (e) {
                out.innerHTML = `<div style='text-align:center; margin-top:100px; color:red;'>Koneksi terputus. Klik tombol Generate lagi.</div>`;
            }
            b.disabled = false; b.innerText = "🚀 JALANKAN TANPA GOOGLE";
        }
    </script>
</body>
</html>
